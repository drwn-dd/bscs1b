<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 1</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #2e2e2e;
    font-family: 'Poppins', sans-serif;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    width: 600px;
    max-width: 95%;
    background-color: #1f3b1f;
    border: 2px solid #00ff00;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
}

h2 {
    color: #00ff00;
    margin-bottom: 20px;
}

.carousel {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding-bottom: 10px;
}

.carousel-item {
    flex: 0 0 auto;
    width: 200px;
    height: 140px;
    border: 2px solid #00ff00;
    border-radius: 15px;
    overflow: hidden;
}

.carousel-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.note button {
    margin-top: 10px;
    margin-right: 5px;
    padding: 8px 10px;
    background: #223922;
    color: #00ff00;
    border: 1px solid #00ff00;
    border-radius: 8px;
    cursor: pointer;
}

.back-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 18px;
    border: 2px solid #00ff00;
    border-radius: 10px;
    text-decoration: none;
    color: #00ff00;
}
</style>
</head>

<body>

<div class="card">
    <h2>Lab 1 - Carousel</h2>

    <div class="carousel" id="carousel">
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg"></div>
    </div>

    <div class="note">
        <button onclick="scrollToItem(0)">1</button>
        <button onclick="scrollToItem(1)">2</button>
        <button onclick="scrollToItem(2)">3</button>
        <button onclick="scrollToItem(3)">4</button>
        <button onclick="scrollToItem(4)">5</button>
        <button onclick="scrollToItem(5)">6</button>
    </div>

    <p style="margin-top:15px;">BSCS 1B | ITEC50</p>

    <a href="index.html" class="back-btn"> Back to Portfolio </a>
</div>

<script>
function scrollToItem(index) {
    const carousel = document.getElementById("carousel");
    const item = carousel.children[index];
    carousel.scrollTo({
        left: item.offsetLeft,
        behavior: "smooth"
    });
}
</script>

</body>
</html>
